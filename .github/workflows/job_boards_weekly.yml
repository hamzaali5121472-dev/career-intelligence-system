name: Job Boards Weekly Collection

on:
  schedule:
    # Every Sunday at 8:00 AM EST = 1:00 PM UTC
    - cron: '0 13 * * 0'
  workflow_dispatch:

jobs:
  collect-job-boards:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create data directories
        run: mkdir -p data/raw data/enriched data/logs

      - name: Run Job Bank Canada collector
        run: python -m collectors.job_bank_collector

      - name: Run Stats Canada collector
        run: python -m collectors.stats_canada_collector

      - name: Upload job market data
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: job-market-${{ github.run_id }}
          path: |
            data/raw/jobbank_*.json
            data/raw/statcan_*.json
          retention-days: 30
